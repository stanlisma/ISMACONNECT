<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline | ISMACONNECT</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f9ff;
        --surface: #ffffff;
        --line: #d5e4fb;
        --text: #102a43;
        --text-soft: #5e7796;
        --primary: #1e5fe0;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top left, rgba(47, 109, 246, 0.12), transparent 28%),
          linear-gradient(180deg, #f7fbff 0%, #edf5ff 100%);
        font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        color: var(--text);
      }

      .card {
        width: min(640px, 100%);
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: 24px;
        background: var(--surface);
        box-shadow: 0 18px 48px rgba(13, 66, 130, 0.12);
      }

      .eyebrow {
        display: inline-flex;
        padding: 6px 12px;
        border-radius: 999px;
        background: #e8f1ff;
        color: #1549b7;
        font-size: 12px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      h1 {
        margin: 16px 0 12px;
        font-size: clamp(2rem, 4vw, 2.8rem);
        line-height: 1.05;
      }

      p {
        margin: 0;
        color: var(--text-soft);
        line-height: 1.65;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 22px;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 46px;
        padding: 0 18px;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 700;
      }

      .primary {
        background: linear-gradient(135deg, #1e5fe0, #1549b7);
        color: white;
      }

      .secondary {
        border: 1px solid var(--line);
        background: white;
        color: var(--text);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <span class="eyebrow">Offline</span>
      <h1>ISMACONNECT is offline right now</h1>
      <p>
        You can still reopen pages you&apos;ve already visited, but fresh marketplace data,
        messages, and posting tools need a connection.
      </p>
      <div class="actions">
        <a class="primary" href="/browse">Browse cached listings</a>
        <a class="secondary" href="/">Back home</a>
      </div>
    </main>
  </body>
  </html>
